<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dice Game</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster|Poppins:400,600,700,800&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-wrapper">
  <div class="container">
    
    <div class="header">
      <h1 id="title">⚔️ DICE BATTLE ARENA ⚔️</h1>
      <div class="round-indicator" id="roundIndicator">ROUND 1</div>
    </div>

    <!-- Main Battle Grid -->
    <div class="dice-arena">
      <!-- Player 1 Zone -->
      <div class="player-zone" id="player1Zone">
        <div class="player-header">
          <span class="avatar-icon">👑</span>
          <span class="player-name">PLAYER 1</span>
          <div class="score-circle" id="score1">0</div>
        </div>
        <div class="dice-container">
          <img class="dice-img img1" id="dice1" src="images/dice6.png" alt="Dice">
        </div>
        <div class="player-stats">
          <span class="stat-badge">🎯 WARRIOR</span>
        </div>
      </div>

      <!-- VS Middle -->
      <div class="vs-banner">
        <div class="vs-circle">VS</div>
        <div class="battle-animation">⚡</div>
      </div>

      <!-- Player 2 Zone -->
      <div class="player-zone" id="player2Zone">
        <div class="player-header">
          <span class="avatar-icon">⚡</span>
          <span class="player-name">PLAYER 2</span>
          <div class="score-circle" id="score2">0</div>
        </div>
        <div class="dice-container">
          <img class="dice-img img2" id="dice2" src="images/dice6.png" alt="Dice">
        </div>
        <div class="player-stats">
          <span class="stat-badge">⚡ GLADIATOR</span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="control-panel">
      <button class="action-btn roll-btn" id="rollBtn">
        <span class="btn-icon">🎲</span>
        <span class="btn-text">ROLL</span>
        <span class="btn-shortcut">R / ␣</span>
      </button>
      <button class="action-btn reset-btn" id="resetBtn">
        <span class="btn-icon">🔄</span>
        <span class="btn-text">RESET</span>
        <span class="btn-shortcut">ESC</span>
      </button>
    </div>

    <!-- Result Display -->
    <div class="result-panel">
      <div class="result-card">
        <span class="result-emoji" id="resultEmoji">🎯</span>
        <span class="result-message" id="resultMessage">PRESS ROLL TO START BATTLE</span>
      </div>
    </div>

    <!-- Winner Announcement Modal -->
    <div class="winner-modal" id="winnerModal">
      <div class="winner-modal-content">
        <div class="winner-trophy">🏆</div>
        <div class="winner-name" id="winnerName">PLAYER 1 WINS!</div>
        <div class="winner-message" id="winnerMessage">Congratulations! First to 5 points!</div>
        <button class="winner-close-btn" id="winnerCloseBtn">PLAY AGAIN</button>
      </div>
    </div>

    <div class="trophy-animation" id="trophyAnim">🏆</div>
  </div>

  <footer>
    <div class="footer-content">
      <span>🎲 DICE DUEL · SCREEN RECORD OPTIMIZED 🎲</span>
      <span class="key-hint">⌨️ R / SPACE = ROLL | ESC = RESET | FIRST TO 5 WINS THE GAME</span>
    </div>
  </footer>
</div>

<script src="index.js"></script>
</body>
</html>
